server {
    listen 80;
    listen [::]:80;

    error_page 404 /404/index.html;
    error_page 403 /403/index.html;

    
    location /api/ {

        proxy_pass http://app:8008;      

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";

        # CORS заголовки для браузера
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition,Content-Length' always;
        add_header 'Vary' 'Origin' always;

        # Ответ на preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location / {
        alias  /var/www/auth/;
        index  index.html;
        try_files $uri $uri/ =404;
    }

    location /menu/ {
        alias  /var/www/menu/;
        index  index.html;
        try_files $uri $uri/ =404;
    }

    location /admin/ {
        alias  /var/www/admin/;
        index  index.html;
        try_files $uri $uri/ =404;
    }


    location /auth/ {
        alias /var/www/auth/;
        index index.html;
        try_files $uri $uri/ =404;
    }



    location = /docs { return 301 /docs/; }
    
    location = /docs/ {
    proxy_pass http://app:8008/swagger/index.html;
    proxy_set_header Host $host;
    }

    location /docs/ {
        proxy_pass http://app:8008/swagger/;
        proxy_set_header Host $host;
    }

    location = /404/index.html {
        root /var/www;
        internal;
    }

    location ^~ /img/ {
        alias /var/www/img/;
    }

    location ^~ /404/ {
        root /var/www;
        try_files $uri =404;
        # без internal!
    }

    location /403/ {
        alias /var/www/403/;
        internal;
    }

}
