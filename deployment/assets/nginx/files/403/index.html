<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>403 — Доступ запрещён</title>
  <style>
    :root{
      --bg:#0f1216;
      --sidebar:#0b0e12;
      --header:#131821;
      --surface:#151a23;
      --surface-2:#1a202b;
      --border:#202635;
      --fg:#e7ecf3;
      --muted:#95a0b1;
      --accent:#2dd4bf;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;}

    .grid{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;height:100vh;gap:0}
    .sidebar{grid-row:1/3;background:var(--sidebar);border-right:1px solid var(--border);padding:12px}
    .header{grid-column:2;background:var(--header);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:10px 16px}
    .content{grid-column:2;padding:18px;overflow:auto}

    .logo{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.35)}
    .logo::before{content:"";width:14px;height:14px;border-radius:50%;background:var(--accent);opacity:.9}

    .nav{margin-top:12px;display:grid;gap:10px}
    .nav .item{height:38px;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
    .nav .item.active{background:linear-gradient(0deg,rgba(45,212,191,.14),rgba(45,212,191,.14)),var(--surface-2);outline:1px solid rgba(45,212,191,.35)}

    .search{flex:1;max-width:560px;margin-inline:auto;height:36px;border-radius:999px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;padding:0 12px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:8px;opacity:.9}
    .search .bar{flex:1;height:8px;border-radius:6px;background:linear-gradient(90deg,#243044,#1b2636)}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow)}
    .stack{display:grid;gap:14px}
    .skeleton{height:44px;border-radius:12px;background:linear-gradient(90deg,#202735,#1a2230,#202735);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite}
    @keyframes shimmer{0%{background-position:0 0}100%{background-position:-200% 0}}

    .hero{padding:22px}
    .hero-inner{display:grid;gap:14px}
    .badge{height:34px;width:88px;border-radius:999px;background:rgba(45,212,191,.12);display:grid;place-items:center;border:1px solid rgba(45,212,191,.35);font-weight:600;color:var(--accent)}
    .big{font-size:clamp(60px,12vw,130px);line-height:1;margin:8px 0 0;background:linear-gradient(135deg,var(--accent),#58c4f6 60%,#7c8cfb);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 8px 24px rgba(0,0,0,.25))}
    .sub{color:var(--muted);margin:0}

    .row{display:grid;grid-template-columns:1fr;gap:14px}
    @media (min-width:900px){.row{grid-template-columns:1fr 1fr}}
    .card.pad{padding:16px}

    .actions{display:flex;gap:12px;flex-wrap:wrap}
    .btn{appearance:none;border:0;cursor:pointer;padding:.8rem 1rem;border-radius:12px;font-weight:700;background:var(--accent);color:#0b1016}
    .btn.ghost{background:transparent;color:var(--fg);border:1px solid var(--border)}
  </style>
</head>
<body>
  <div class="grid">
    <aside class="sidebar">
      <div class="logo" aria-label="logo"></div>
      <nav class="nav">
        <div class="item active"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </nav>
    </aside>

    <header class="header" role="banner">
      <div class="search" aria-label="Поиск">
        <span class="dot"></span>
        <div class="bar"></div>
      </div>
    </header>

    <main class="content" role="main">
      <div class="stack">
        <div class="skeleton" style="width:60%"></div>
        <div class="skeleton" style="width:48%"></div>

        <section class="card hero">
          <div class="hero-inner">
            <div class="badge">ошибка</div>
            <h1 class="big" aria-label="403">403</h1>
            <p class="sub">Доступ запрещён. У вас нет прав для просмотра этой страницы.</p>
          </div>
        </section>

        <section class="row">
          <div class="card pad">
            <div class="skeleton" style="height:120px"></div>
          </div>
          <div class="card pad">
            <div class="skeleton" style="height:120px"></div>
          </div>
        </section>

        <section class="row">
          <div class="card pad">
            <div class="actions">
              <button class="btn" onclick="location.href='/'">На главную</button>
              <button class="btn ghost" onclick="history.back()">Назад</button>
              <button class="btn ghost" onclick="location.href='/login'">Войти</button>
            </div>
          </div>
          <div class="card pad">
            <div class="skeleton"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
