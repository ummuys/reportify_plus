services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    networks:
      - reportify-network
    ports:
      - "8088:80"
    volumes:
      - ./assets/nginx/files/:/var/www/:rw
      - ./assets/nginx/main.conf:/etc/nginx/conf.d/default.conf:ro
    command: >
      sh -c "chown -R nginx:nginx /var/www && 
             chmod -R 755 /var/www && 
             nginx -g 'daemon off;'"
    depends_on:
      - gateway-service

  gateway-service:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
      target: gateway
    image: gateway-service
    container_name: ${GATEWAY_SERVICE_CONTAINER_NAME}
    env_file:
      - ./../.env
      - ./../services/gateway/.env
    ports:
      - ${GATEWAY_SERVICE_OUT_PORT}:${GATEWAY_SERVICE_IN_PORT}
    depends_on:
      auth-migration:
        condition: service_completed_successfully
    restart: always
    networks:
      - reportify-network

##############################################################
############################ AUTH ############################
##############################################################

  auth-service:
    build: 
      context: ../
      dockerfile: deployment/Dockerfile
      target: auth
    image: auth-service
    container_name: ${AUTH_SERVICE_CONTAINER_NAME}
    env_file:
      - ./../.env
      - ./../services/auth/.env
    ports:
      - ${AUTH_SERVICE_OUT_PORT}:${AUTH_SERVICE_IN_PORT}
    restart: always
    depends_on:
      auth-migration:
        condition: service_completed_successfully
    networks:
      - reportify-network
    
    
  auth-db:
    image: postgres:17
    env_file:
      - ./../.env
    container_name: ${AUTH_DB_CONTAINER_NAME}
    environment: 
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - ${AUTH_DB_OUT_PORT}:${AUTH_DB_IN_PORT}
    networks:
      - reportify-network
    volumes:
      - auth-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}" ]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  auth-migration:
    image: migrate/migrate
    env_file:
      - ./../.env
    container_name: auth-migration
    environment:
      AUTH_DB_MIG: ${AUTH_DB_MIG}
    volumes:
      - ./assets/db/userdata/migrations:/migrations
    command: ["-path", "/migrations", "-database", "${AUTH_DB_MIG}", "up"]
    depends_on:
      auth-db:
        condition: service_healthy
    restart: no
    networks:
      - reportify-network

##############################################################
########################### REPORT ###########################
##############################################################

  report-service:
    build: 
      context: ../
      dockerfile: deployment/Dockerfile
      target: report
    image: report-service
    container_name: ${REPORT_SERVICE_CONTAINER_NAME}
    env_file:
      - ./../.env
      - ./../services/report/.env
    ports:
      - ${REPORT_SERVICE_OUT_PORT}:${REPORT_SERVICE_IN_PORT}
    restart: always
    depends_on:
      report-migration:
        condition: service_completed_successfully
    networks:
      - reportify-network

  report-minio:
    image: quay.io/minio/minio:latest
    container_name: ${REPORT_MINIO_CONTAINER_NAME}
    ports:
      - ${REPORT_MINIO_OUT_API_PORT}:${REPORT_MINIO_IN_API_PORT}
      - ${REPORT_MINIO_OUT_PORT}:${REPORT_MINIO_IN_PORT}
    environment:
      MINIO_ROOT_USER: ${REPORT_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${REPORT_MINIO_PASSWORD}
    volumes:
      - report-minio-data:/data 
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - reportify-network

  report-db:
    image: postgres:17
    env_file:
      - ./../.env
    container_name: ${REPORT_DB_CONTAINER_NAME}
    environment: 
      POSTGRES_USER: ${REPORT_DB_USER}
      POSTGRES_PASSWORD: ${REPORT_DB_PASSWORD}
      POSTGRES_DB: ${REPORT_DB_NAME}
    ports:
      - ${REPORT_DB_OUT_PORT}:${REPORT_DB_IN_PORT}
    networks:
      - reportify-network
    volumes:
      - report-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${REPORT_DB_USER} -d ${REPORT_DB_NAME}" ]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  report-migration:
    image: migrate/migrate
    env_file:
      - ./../.env
    container_name: report-migration
    environment:
      REPORT_DB_MIG: ${REPORT_DB_MIG}
    volumes:
      - ./assets/db/report/migrations:/migrations
    command: ["-path", "/migrations", "-database", "${REPORT_DB_MIG}", "up"]
    depends_on:
      report-db:
        condition: service_healthy
    restart: no
    networks:
      - reportify-network



  report-kafka:
    image: apache/kafka:latest
    container_name: ${REPORT_KAFKA_CONTAINER_NAME}
    hostname: ${REPORT_KAFKA_CONTAINER_NAME}
    environment:

      KAFKA_BROKER_ID: ${REPORT_KAFKA_BROKER_ID}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${REPORT_KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}

      KAFKA_ADVERTISED_LISTENERS: ${REPORT_KAFKA_ADVERTISED_LISTENERS}

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${REPORT_KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${REPORT_KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${REPORT_KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${REPORT_KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}

      # KRaft
      KAFKA_PROCESS_ROLES: ${REPORT_KAFKA_PROCESS_ROLES}
      KAFKA_NODE_ID: ${REPORT_KAFKA_NODE_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${REPORT_KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${REPORT_KAFKA_LISTENERS}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${REPORT_KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${REPORT_KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_LOG_DIRS: ${REPORT_KAFKA_LOG_DIRS}
      CLUSTER_ID: ${REPORT_KAFKA_CLUSTER_ID}

##############################################################
######################## REPORT-WORKER #######################
##############################################################

volumes:
  report-db:
  auth-db:
  report-minio-data:

networks:
  reportify-network:
    external: true
