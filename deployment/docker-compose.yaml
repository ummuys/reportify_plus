  auth-db:
    image: postgres:17
    container_name: auth-db
    environment: 
      POSTGRES_USER: ${PG_AUTH_USER}
      POSTGRES_PASSWORD: ${PG_AUTH_PASSWORD}
      POSTGRES_DB: ${PG_AUTH_DB}
    ports:
      - 5433:5432
    networks:
      - reportify_network
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_AUTH_USER} -d ${PG_AUTH_DB}" ]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  auth-migration:
    image: migrate/migrate
    container_name:  auth-migration
    environment:
     - ${DB_AUTH_URL}
    volumes:
      - ./assets/db/userdata/migrations:/migrations
    command: ["-path", "/migrations", "-database", "${DB_AUTH_URL}", "up"]
    depends_on:
      auth-db:
        condition: service_healthy
    restart: no
    networks:
      - reportify_network

