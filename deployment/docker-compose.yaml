services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    networks:
      - reportify-network
    ports:
      - "8088:80"
    volumes:
      - ./assets/nginx/files/:/var/www/:rw
      - ./assets/nginx/main.conf:/etc/nginx/conf.d/default.conf:ro
    command: >
      sh -c "chown -R nginx:nginx /var/www && 
             chmod -R 755 /var/www && 
             nginx -g 'daemon off;'"
    depends_on:
      - gateway-service

  gateway-service:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
      target: gateway
    image: gateway-service
    container_name: ${GATEWAY_SERVICE_CONTAINER_NAME}
    env_file:
      - ./../.env
      - ./../services/gateway/.env
    ports:
      - ${GATEWAY_SERVICE_OUT_PORT}:${GATEWAY_SERVICE_IN_PORT}
    depends_on:
      auth-migration:
        condition: service_completed_successfully
    restart: always
    networks:
      - reportify-network

##############################################################
############################ AUTH ############################
##############################################################

  auth-service:
    build: 
      context: ../
      dockerfile: deployment/Dockerfile
      target: auth
    image: auth-service
    container_name: ${AUTH_SERVICE_CONTAINER_NAME}
    env_file:
      - ./../.env
      - ./../services/auth/.env
    ports:
      - ${AUTH_SERVICE_OUT_PORT}:${AUTH_SERVICE_IN_PORT}
    restart: always
    depends_on:
      auth-migration:
        condition: service_completed_successfully
    networks:
      - reportify-network
    
    
  auth-db:
    image: postgres:17
    env_file:
      - ./../.env
    container_name: ${AUTH_DB_CONTAINER_NAME}
    environment: 
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - ${AUTH_DB_OUT_PORT}:${AUTH_DB_IN_PORT}
    networks:
      - reportify-network
    volumes:
      - auth-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}" ]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  auth-migration:
    image: migrate/migrate
    env_file:
      - ./../.env
    container_name: auth-migration
    environment:
      AUTH_DB_MIG: ${AUTH_DB_MIG}
    volumes:
      - ./assets/db/userdata/migrations:/migrations
    command: ["-path", "/migrations", "-database", "${AUTH_DB_MIG}", "up"]
    depends_on:
      auth-db:
        condition: service_healthy
    restart: no
    networks:
      - reportify-network

##############################################################
########################### REPORT ###########################
##############################################################
  report-minio:
    image: quay.io/minio/minio:latest
    container_name: ${REPORT_MINIO_CONTAINER_NAME}
    ports:
      - ${REPORT_MINIO_OUT_API_PORT}:${REPORT_MINIO_IN_API_PORT}
      - ${REPORT_MINIO_OUT_PORT}:${REPORT_MINIO_IN_PORT}
    environment:
      MINIO_ROOT_USER: ${REPORT_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${REPORT_MINIO_PASSWORD}
    volumes:
      - report-minio-data:/data 
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - reportify-network

volumes:
  auth-db:
  report-minio-data:

networks:
  reportify-network:
    external: true
