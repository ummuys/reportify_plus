all: false
force-file-write: true
formatter: goimports
include-auto-generated: false
log-level: info
recursive: false
template: testify

packages:
  # AUTH DATABASE
  github.com/ummuys/reportify/services/auth/internal/repository:
    config:
      dir: services/auth/internal/mocks
      pkgname: mocks
      filename: authdb_mock.go
      structname: Mock{{.InterfaceName}}
    interfaces:
      AuthDB:

  # AUTH HASHER 
  github.com/ummuys/reportify/services/auth/internal/secure:
    config:
      dir: services/auth/internal/mocks
      pkgname: mocks
      filename: hasher_mock.go
      structname: Mock{{.InterfaceName}}
    interfaces:
      PasswordHasher:

  # AUTH TOKEN
  github.com/ummuys/reportify/pkg/tm:
    config:
      dir: services/auth/internal/mocks
      pkgname: mocks
      filename: tm_mock.go
      structname: Mock{{.InterfaceName}}
    interfaces:
      TokenManager:


  # DATASOURCE AND REPORT DATABASE
  github.com/ummuys/reportify/services/report/internal/repository:
      config:
        dir: services/report/internal/mocks
        pkgname: mocks
        structname: Mock{{.InterfaceName}}
      interfaces:
        DatasourceDB:
          config:
            filename: report_datasource_database_mock.go
        ReportDB:
          config:
            filename: report_report_database_mock.go

  # REPORT CACHE
  github.com/ummuys/reportify/services/report/internal/cache:
      config:
        dir: services/report/internal/mocks
        pkgname: mocks
        filename: report_cache_mock.go
        structname: Mock{{.InterfaceName}}
      interfaces:
        ReportCache:
        
  # REPORT-WORKER CACHE
  github.com/ummuys/reportify/services/report-worker/internal/cache:
      config:
        dir: services/report-worker/internal/mocks
        pkgname: mocks
        filename: report_worker_cache_mock.go
        structname: Mock{{.InterfaceName}}
      interfaces:
        ReportCache:

  # REPORT-WORKER CONVERT
  github.com/ummuys/reportify/services/report-worker/internal/convert:
      config:
        dir: services/report-worker/internal/mocks
        pkgname: mocks
        filename: report_worker_convert_mock.go
        structname: Mock{{.InterfaceName}}
      interfaces:
        ReportConvert:

  # REPORT-WORKER Kafka
  github.com/ummuys/reportify/services/report-worker/internal/kafkacli:
      config:
        dir: services/report-worker/internal/mocks
        pkgname: mocks
        filename: report_worker_kafkacli_mock.go
        structname: Mock{{.InterfaceName}}
      interfaces:
        KafkaConsumer:

  # REPORT-WORKER MinIO
  github.com/ummuys/reportify/services/report-worker/internal/miniocli:
      config:
        dir: services/report-worker/internal/mocks
        pkgname: mocks
        filename: report_worker_minio_mock.go
        structname: Mock{{.InterfaceName}}
      interfaces:
        MinIOClient:

  # REPORT-WORKER DATASOURCE AND REPORT DATABASE
  github.com/ummuys/reportify/services/report-worker/internal/repository:
      config:
        dir: services/report-worker/internal/mocks
        pkgname: mocks
        structname: Mock{{.InterfaceName}}
      interfaces:
        DatasourceDB:
          config:
            filename: report_worker_datasource_database_mock.go
        ReportDB:
          config:
            filename: report_worker_report_database_mock.go

