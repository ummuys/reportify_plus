syntax = "proto3";

package report.v1;

option go_package = "github.com/ummuys/reportify/api/pb/report/v1;reportv1";

service ReportService {
    rpc CreateReport (CreateReportRequest) returns (CreateReportResponse);
    rpc CheckReportStatus (CheckReportStatusRequest) returns (CheckReportStatusResponse);
}

message CreateReportRequest {
    string author_id = 1;
    string name = 2;
    string comm = 3;
    string query = 4;
    string csv_sep = 5;
}

message CreateReportResponse {
    string uuid = 1;
}

message CheckReportStatusRequest {
    string uuid = 1;
}

message CheckReportStatusResponse {
    string status = 1;
}