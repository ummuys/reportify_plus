syntax = "proto3";

package report.v1;

option go_package = "github.com/ummuys/reportify/api/pb/report/v1;reportv1";

import "google/protobuf/timestamp.proto";

service ReportService {
    rpc CreateReport (CreateReportRequest) returns (CreateReportResponse);
    rpc ReportStatus (ReportStatusRequest) returns (ReportStatusResponse);
    rpc ListUserReports (ListUserReportsRequest) returns (ListUserReportsResponse);

    // metadata discovery 
    rpc ListSchemas (ListSchemasRequest) returns (ListSchemasResponse);
    rpc ListTables  (ListTablesRequest)  returns (ListTablesResponse);
    rpc ListColumns (ListColumnsRequest) returns (ListColumnsResponse);
}

message CreateReportRequest {
    string author_id = 1;
    string name = 2;
    string comm = 3;
    string query = 4;
    string format = 5;
    string csv_sep = 6;
}

message CreateReportResponse {
    string uuid = 1;
    string status = 2;
}

message ReportStatusRequest {
    string uuid = 1;
}

message ReportStatusResponse {
    string uuid = 1;
    string status = 2;
    string err_msg = 3;
    string file_path = 4;
}

message ListUserReportsRequest {
    string author_id = 1;
}

message ListUserReportsResponse {
    repeated ReportMetadata reports = 1;
}

message ReportMetadata {
    string report_id = 1;
    string author_id = 2;
    string name = 3;
    string comm = 4;
    string query = 5;
    string format = 6;
    string csv_sep = 7;
    string status = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
    string file_path = 11;
    string err_msg = 12;
}

/* ===== Schemas ===== */

message ListSchemasRequest {
    // string data_source_id = 1;
}

message ListSchemasResponse {
    repeated Schema schemas = 1;
}

message Schema {
    string schema_name = 1;
    string schema_comm = 2;
}

/* ===== Tables ===== */

message ListTablesRequest {
    string schema_name = 1;
}

message ListTablesResponse {
    repeated Table tables = 1;
}

message Table {
    string table_name = 1;
    string table_comm = 2;
}

/* ===== Columns ===== */

message ListColumnsRequest {
    string schema_name = 1;
    string table_name = 2;
}

message ListColumnsResponse {
    repeated Column columns = 1;
}

message Column {
    string column_name = 1;
    string column_comm = 2;
}
