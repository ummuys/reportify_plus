syntax = "proto3";

package report.v1;

option go_package = "github.com/ummuys/reportify/api/pb/report/v1;reportv1";

service ReportService {
    rpc CreateReport (CreateReportRequest) return (CreateReportResponse);
    rpc CheckReportStatus (CheckReportStatusRequest) return (ChechReportStatusResponse);
}

message CreateReportRequest {
    string report_name = 1;
    string report_comm = 2;
    string query = 3;
    string csv_sep = 4;
}

message CreateReportResponse {
    string report_UUID = 1;
}