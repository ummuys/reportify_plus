syntax = "proto3";

package report.service.v1;

option go_package = "github.com/ummuys/reportify/api/pb/report/service/v1;reportservicev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service ReportService {
  rpc CreateReport (CreateReportRequest) returns (CreateReportResponse);
  rpc ReportStatus (ReportStatusRequest) returns (ReportStatusResponse);
  rpc ListReports (ListReportsRequest) returns (ListReportsResponse);
  rpc ReportInfo (ReportInfoRequest) returns (ReportInfoResponse);
  rpc DeleteReports (DeleteReportsRequest) returns (google.protobuf.Empty);
  rpc DeleteReport (DeleteReportRequest) returns (DeleteReportResponse);
}

message CreateReportRequest {
  string author_id = 1;
  string name = 2;
  string comm = 3;
  string query = 4;
  string format = 5;
  string csv_sep = 6;
}

message CreateReportResponse {
  string report_id = 1;
  string status = 2;
}

message ReportStatusRequest {
  string author_id = 1;
  string report_id = 2;
}

message ReportStatusResponse {
  string report_id = 1;
  string status = 2;
}

message ListReportsRequest {
  string author_id = 1;
}

message ListReportsResponse {
  repeated ReportMetadata reports = 1;
}

message ReportInfoRequest {
  string author_id = 1;
  string report_id = 2;
}

message ReportInfoResponse {
  ReportMetadata report = 1;
}

message DeleteReportsRequest {
  string author_id = 1;
}

message DeleteReportRequest {
  string author_id = 1;
  string report_id = 2;
}

message DeleteReportResponse {
  string report_id = 1;
}

message ReportMetadata {
  string report_id = 1;
  string name = 2;
  string comm = 3;
  string query = 4;
  string format = 5;
  string csv_sep = 6;
  string status = 7;
  string file_path = 8;
  google.protobuf.Timestamp created_at = 9;
  string err_msg = 10;
}
