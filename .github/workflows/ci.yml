name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - P3-07 # Удалить. Это для тестов

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Run lint
        run: make -C deployment ci-lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Run tests
        run: make -C deployment ci-test

  race:
    name: Race subset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Run race tests
        run: make -C deployment ci-race

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build report image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          target: report
          tags: reportify-report:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-conclusion:
    name: CI Conclusion
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, test, race, docker-build]
    steps:
      - name: Check required jobs
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
